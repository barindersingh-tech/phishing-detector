<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Phishing Detector</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    

    <div class="card">

        <!-- Top Right Controls -->
<div class="top-controls">
    <span id="userType" class="user-badge">Free</span>
    <button id="premiumBtn" class="premium-btn">💎</button>
    <button id="themeToggle" class="theme-btn">🌙</button>
</div>

        <!-- Header -->
        <h1>🤖 AI Phishing Detector</h1>
        <p class="subtitle">Smart URL Security Analyzer</p>

        <!-- Input -->
        <div class="input-group">
            <input type="text" id="urlInput" placeholder="Enter URL (https://example.com)">
            <button onclick="checkURL()">Analyze</button>
        </div>

        <!-- Loader -->
        <div id="loader" class="loader hidden"></div>

        <!-- Result -->
        <div id="resultBox" class="result hidden">
            <h2 id="resultText"></h2>
            <p id="confidence"></p>
            <p id="riskScore"></p>
            <p id="riskLevel"></p>
            <p id="explanation"></p>
            <ul id="reasons"></ul>
        </div>

        <!-- History -->
        <div class="history-section">
            <h3>📜 History</h3>
            <ul id="historyList"></ul>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
