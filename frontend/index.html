<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Phishing Detector</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card">

        <!-- Header -->
        <h1>🤖 AI Phishing Detector</h1>
        <p class="subtitle">Smart URL Security Analyzer</p>

        <!-- Input -->
        <div class="input-group">
            <input type="text" id="urlInput" placeholder="Enter URL (https://example.com)">
            <button onclick="checkURL()">Analyze</button>
        </div>

        <!-- Loader -->
        <div id="loader" class="loader hidden"></div>

        <!-- Result -->
        <div id="resultBox" class="result hidden">
            <h2 id="resultText"></h2>
            <p id="confidence"></p>
            <ul id="reasons"></ul>
        </div>

        <!-- ✅ HISTORY (YOU MISSED THIS) -->
        <h3>History</h3>
        <ul id="historyList"></ul>

        <!-- ✅ DASHBOARD -->
        <h3>Dashboard</h3>

        <div class="chart-container">
            <canvas id="pieChart"></canvas>
        </div>

        <div class="chart-container">
            <canvas id="barChart"></canvas>
        </div>

    </div>

</div>

<!-- ✅ CORRECT ORDER -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
